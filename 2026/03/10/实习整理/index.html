<script>
  (function (window, document) {
    'use strict';

    var hexoBlogEncrypt = window.hexoBlogEncrypt = {
      decrypt: function () {
        var pass = document.getElementById('hbePass').value;
        var encryptedData = document.getElementById('hbeData').textContent;
        var hmacDigest = document.getElementById('hbeData').dataset.hmacdigest;

        if (!encryptedData || !hmacDigest) {
          console.error('No encrypted data found');
          return;
        }

        try {
          var decrypted = CryptoJS.AES.decrypt(encryptedData, pass);
          decrypted = decrypted.toString(CryptoJS.enc.Utf8);

          if (CryptoJS.SHA256(decrypted).toString() === hmacDigest) {
            document.getElementById('hexo-blog-encrypt').innerHTML = decrypted;
          } 
        } catch (e) {
          
        }
      }
    };

    // 绑定回车事件
    document.getElementById('hbePass').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        hexoBlogEncrypt.decrypt();
      }
    });

  })(window, document);
